<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - Premium Living</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <i class="fas fa-tree" style="font-size: 3rem; color: var(--wood-light);"></i>
            <h1>Premium Living</h1>
            <p>Welcome to our wooden sanctuary</p>
        </div>
        <form action="dashboard.html" method="POST">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email / Customer ID</label>
                <input type="text" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-arrow-right"></i> Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">New customer? <a href="../staff/register.html" style="color: var(--wood-light);">Create account</a></p>
        <p style="text-align: center; margin-top: 0.5rem;"><a href="../index.php" style="color: #8a7a6a;">← Back to Home</a></p>
    </div>
</div>
</body>
</html>
