<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile - Premium Living Furniture</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">
        <h1><a href="dashboard.html">🏠 Premium Living</a></h1>
    </div>
    <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="make-order.html">Make Order</a></li>
        <li><a href="view-orders.html">View Orders</a></li>
        <li><a href="update-profile.html">My Profile</a></li>
        <li><a href="delete-order.html">Delete Order</a></li>
        <li><a href="../index.php">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>Update Profile Information</h2>
        </div>
        <form action="dashboard.html" method="POST">
            <div class="form-group">
                <label for="cname">Full Name</label>
                <input type="text" id="cname" name="cname" value="John Doe" disabled>
                <small>Name cannot be changed. Contact support for assistance.</small>
            </div>
            <div class="form-group">
                <label for="cpassword">New Password</label>
                <input type="password" id="cpassword" name="cpassword" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password">
            </div>
            <div class="form-group">
                <label for="ctel">Contact Number</label>
                <input type="tel" id="ctel" name="ctel" value="+852 1234 5678" required>
            </div>
            <div class="form-group">
                <label for="caddr">Delivery Address</label>
                <textarea id="caddr" name="caddr" rows="3" required>123 Main Street, Hong Kong</textarea>
            </div>
            <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" id="company" name="company" value="ABC Company Ltd.">
            </div>
            <button type="submit" class="btn btn-primary">Update Profile</button>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2024 Premium Living Furniture Co. Ltd. All rights reserved.</p>
</footer>
</body>
</html>
