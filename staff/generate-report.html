<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Report - Premium Living</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<nav class="navbar">
    <div class="logo"><h1><a href="dashboard.php"><i class="fas fa-tree"></i> Staff Portal</a></h1></div>
    <ul class="nav-links">
        <li><a href="dashboard.php">Dashboard</a></li><li><a href="insert-furniture.html">Add Furniture</a></li>
        <li><a href="insert-material.html">Add Material</a></li><li><a href="manage-orders.html">Manage Orders</a></li>
        <li><a href="generate-report.html">Reports</a></li><li><a href="delete-furniture.html">Delete Item</a></li>
        <li><a href="../index.php">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card"><div class="card-header"><h2><i class="fas fa-chart-line"></i> Sales Analytics</h2>
        <div class="filter-bar"><select id="rangeSelect" class="filter-select"><option value="7">Last 7 Days</option><option value="30" selected>Last 30 Days</option><option value="90">Last 3 Months</option></select>
            <button class="btn btn-primary" onclick="refreshReport()"><i class="fas fa-sync"></i> Generate</button>
            <button class="btn btn-success" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Export</button></div>
    </div>
        <div class="stats-grid"><div class="stat-card"><div class="stat-number" id="totalSales">$0</div><div class="stat-label">Total Revenue</div></div>
            <div class="stat-card"><div class="stat-number" id="orderCount">0</div><div class="stat-label">Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="itemsCount">0</div><div class="stat-label">Items Sold</div></div></div>

        <div class="chart-container"><canvas id="revenueChart" height="250"></canvas></div>
        <div class="card"><div class="card-header"><h2><i class="fas fa-receipt"></i> Transaction Details</h2></div>
            <div class="table-container"><table id="reportTable"><thead><tr><th>Order ID</th><th>Date</th><th>Item</th><th>Qty</th><th>Total</th></tr></thead><tbody id="reportBody"></tbody><tfoot><tr style="background:#f5efe6;"><td colspan="4" style="text-align:right;"><strong>Grand Total:</strong></td><td id="grandTotal">$0</td></tr></tfoot></table></div></div>
    </div>

    <script>
        const salesData = [
            { oid:"#1002", date:"2024-03-10", item:"Oak Chair", qty:2, total:900 }, { oid:"#1002", date:"2024-03-10", item:"Sofa", qty:1, total:3800 },
            { oid:"#1003", date:"2024-03-15", item:"Dining Table", qty:1, total:2500 }, { oid:"#1005", date:"2024-03-20", item:"Bookshelf", qty:2, total:2400 },
            { oid:"#1006", date:"2024-03-22", item:"Bed Frame", qty:1, total:2200 }, { oid:"#1007", date:"2024-03-25", item:"Oak Chair", qty:3, total:1350 },
            { oid:"#1008", date:"2024-03-28", item:"Dining Table", qty:1, total:2500 }
        ];
        let chart;

        function getFilteredData(days) {
            const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
            return salesData.filter(d => new Date(d.date) >= cutoff);
        }

        function refreshReport() {
            const days = parseInt(document.getElementById('rangeSelect').value);
            const filtered = getFilteredData(days);
            const total = filtered.reduce((s,i)=>s+i.total,0);
            const orders = new Set(filtered.map(i=>i.oid)).size;
            const items = filtered.reduce((s,i)=>s+i.qty,0);
            document.getElementById('totalSales').innerHTML = `$${total.toLocaleString()}`;
            document.getElementById('orderCount').innerHTML = orders;
            document.getElementById('itemsCount').innerHTML = items;
            document.getElementById('grandTotal').innerHTML = `$${total.toLocaleString()}`;
            const tbody = document.getElementById('reportBody');
            tbody.innerHTML = '';
            filtered.forEach(i => { const r = tbody.insertRow(); r.insertCell(0).innerHTML = i.oid; r.insertCell(1).innerText = i.date; r.insertCell(2).innerText = i.item; r.insertCell(3).innerText = i.qty; r.insertCell(4).innerHTML = `<strong>$${i.total}</strong>`; });
            const daily = {};
            filtered.forEach(i => { const d = i.date; daily[d] = (daily[d]||0) + i.total; });
            const labels = Object.keys(daily).sort();
            const values = labels.map(l => daily[l]);
            if(chart) chart.destroy();
            const ctx = document.getElementById('revenueChart').getContext('2d');
            chart = new Chart(ctx, { type:'line', data:{ labels, datasets:[{ label:'Daily Sales ($)', data:values, borderColor:'#8b5e3c', backgroundColor:'rgba(139,94,60,0.05)', borderWidth:3, fill:true, tension:0.3, pointBackgroundColor:'#d4a373' }] }, options:{ responsive:true, maintainAspectRatio:true } });
        }
        function exportCSV() {
            let csv = [["Order ID","Date","Item","Qty","Total"]];
            document.querySelectorAll('#reportBody tr').forEach(r => { const cells = r.cells; csv.push([cells[0].innerText, cells[1].innerText, cells[2].innerText, cells[3].innerText, cells[4].innerText.replace('$','')]); });
            const blob = new Blob([csv.map(r => r.join(',')).join('\n')], {type:'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `report_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        }
        refreshReport();
    </script>
    <footer><p>&copy; 2024 Premium Living | Data-Driven Craftsmanship</p></footer>
</body>
</html>
