<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Premium Living Family | Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Tailored layout matching the premium aesthetic in image_15bf22.png */
        body {
            background-color: #2b1d16;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0;
        }
        .register-container {
            background-color: #fdfaf4;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 550px;
            padding: 2.5rem;
            box-sizing: border-box;
        }
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .register-header h2 {
            color: #3e2a21;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .register-header p {
            color: #8b5e3c;
            font-size: 0.95rem;
            margin: 0;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #3e2a21;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1px solid rgba(139, 94, 60, 0.25);
            border-radius: 25px;
            background-color: #ffffff;
            color: #3e2a21;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }
        .form-group textarea {
            border-radius: 15px;
            resize: vertical;
            min-height: 100px;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #8b5e3c;
            box-shadow: 0 0 8px rgba(139, 94, 60, 0.2);
        }
        /* Custom styling for the role selector to make it pop */
        .role-selector {
            background-color: #f5eedc;
            border: 1px dashed #8b5e3c !important;
            font-weight: 600;
        }
        .btn-register {
            width: 100%;
            background-color: #8b5e3c;
            color: #ffffff;
            border: none;
            padding: 1rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(139, 94, 60, 0.2);
        }
        .btn-register:hover {
            background-color: #5c3d2e;
        }
        .btn-register:active {
            transform: scale(0.98);
        }
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #8b5e3c;
        }
        .form-footer a {
            color: #3e2a21;
            text-decoration: none;
            font-weight: 600;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <h2>Join Premium Living Family</h2>
        <p>Create your permanent system account below</p>
    </div>

    <!-- Action goes back up one folder level to find register_process.php -->
    <form action="../register_process.php" method="POST">

        <!-- Account Type Selector -->
        <div class="form-group">
            <label for="role">I am registering as a: *</label>
            <select name="role" id="role" class="role-selector" required>
                <option value="customer">Customer (Standard Access)</option>
                <option value="staff">Staff Member (Management Portal Access)</option>
            </select>
        </div>

        <!-- Full Name -->
        <div class="form-group">
            <label for="full_name">Full Name *</label>
            <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
            <label for="confirm_password">Confirm Password *</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
        </div>

        <!-- Contact Number -->
        <div class="form-group">
            <label for="contact_number">Contact Number *</label>
            <input type="tel" id="contact_number" name="contact_number" placeholder="Phone number" required>
        </div>

        <!-- Delivery Address -->
        <div class="form-group">
            <label for="delivery_address">Delivery Address *</label>
            <textarea id="delivery_address" name="delivery_address" placeholder="Your full address" required></textarea>
        </div>

        <!-- Company Name (Optional) -->
        <div class="form-group">
            <label for="company_name">Company Name (Optional)</label>
            <input type="text" id="company_name" name="company_name" placeholder="Company name if applicable">
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-register">
            <i class="fas fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="form-footer">
        Already have an account? <a href="login.php">Log In Here</a>
    </div>
</div>

</body>
</html>
