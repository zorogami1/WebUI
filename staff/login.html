<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Premium Living</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--wood-light);"></i>
            <h1>Staff Portal</h1>
            <p>Authorized access only</p>
        </div>
        <form action="dashboard.html" method="POST">
            <div class="form-group"><label><i class="fas fa-id-badge"></i> Staff ID</label><input type="text" required placeholder="Enter staff ID"></div>
            <div class="form-group"><label><i class="fas fa-key"></i> Password</label><input type="password" required placeholder="Password"></div>
            <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-sign-in-alt"></i> Access Dashboard</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;"><a href="../index.html" style="color: #8a7a6a;">← Back to Home</a></p>
    </div>
</div>
</body>
</html>
